<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slack으로 연결 중...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f8f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .slack-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1d23;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #696f7a;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e8e8e8;
      border-top-color: #4a154b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 28px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #4a154b;
      color: #fff;
      margin-bottom: 12px;
    }

    .btn-primary:hover {
      opacity: 0.88;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #1a1d23;
    }

    .btn-secondary:hover {
      background: #e4e4e4;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #b0b5bd;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e8e8e8;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #b0b5bd;
    }
  </style>
</head>
<body>
  <div class="card">

    <h1>Slack으로 연결 중...</h1>
    <p class="subtitle">잠시 후 자동으로 Slack 앱이 열립니다.<br>앱이 설치되어 있지 않으면 아래 버튼을 눌러주세요.</p>

    <div class="spinner"></div>

    <button class="btn btn-primary" onclick="openApp()">
      Slack 앱으로 열기
    </button>

    <div class="divider">또는</div>

    <a class="btn btn-secondary" href="https://app.slack.com/client/E0573HVHDBR" target="_blank">
      웹 브라우저로 열기
    </a>

    <p class="footer">앱이 없으신가요? <a href="https://slack.com/downloads" style="color:#4a154b; text-decoration:none; font-weight:600;">Slack 다운로드</a></p>
  </div>

  <script>
    function openApp() {
      location.href = "slack://app?team=E0573HVHDBR&id=A0AAF4RFG3G";
    }

    // 자동 딥링크 시도
    openApp();

    // 1.5초 후에도 페이지에 남아 있으면 스피너 숨김 (앱 열렸다고 가정)
    setTimeout(function () {
      document.querySelector(".spinner").style.display = "none";
    }, 1500);
  </script>
</body>
</html>
